[tools]
"gem:kamal" = "latest"
"github:earendil-works/pi" = "latest"
"github:larksuite/cli" = "latest"
"github:Loongphy/codex-auth" = "v0.3.0-alpha.10"
"github:Loongphy/codext" = "latest"
"github:schpet/linear-cli" = "latest"
"go:github.com/xdevplatform/xurl" = "latest"
"npm:codex-sync" = "latest"
"npm:pi-opensync-plugin" = "latest"
bun = "latest"
deno = "latest"
go = "latest"
node = "26"
pnpm = "latest"
python = "latest"
ruby = "latest"
rust = "stable"
uv = "latest"
yarn = "latest"
zig = "latest"

[settings]
lockfile_platforms = ["macos-arm64", "linux-x64"]
trusted_config_paths = [
    "~/Desktop",
    "~/Developer",
    "~/Documents",
    "~/Downloads",
]

[settings.ruby]
compile = false

[env]
_.path = [
    "~/dotfiles/generated/bin",
    "~/dotfiles/modules/bin",
    "/opt/homebrew/opt/postgresql@18/bin",
    "~/.bun/bin",
    "~/.local/bin",
    "~/.modular/bin",
    "~/.opencode/bin",
    "~/.raindrop/bin",
]
