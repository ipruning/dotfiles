[settings]
trusted_config_paths = [
    "~/Desktop",
    "~/Developer",
    "~/Documents",
    "~/Downloads/",
    "~/intent",
]

[settings.ruby]
compile = false

[env]
_.path = [
    "~/dotfiles/generated/bin",
    "~/dotfiles/modules/bin",
    "~/Developer/ipruning/aura/utils/scripts",
    "~/.bun/bin",
    "~/.local/bin",
    "/opt/homebrew/opt/postgresql@18/bin",
]

MISE_AQUA_GITHUB_ATTESTATIONS = false
