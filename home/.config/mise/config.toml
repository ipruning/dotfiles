[tools]
bun = { version = "latest", backend = "core:bun" }
deno = { version = "latest", backend = "core:deno" }
go = { version = "latest", backend = "core:go" }
node = { version = "latest", backend = "core:node" }
python = { version = "latest", backend = "core:python" }
ruby = { version = "latest", backend = "core:ruby" }
rust = { version = "stable", backend = "core:rust" }
zig = { version = "latest", backend = "core:zig" }

"cargo:https://github.com/clouedoc/hzfind" = "latest"
"gem:kamal" = "latest"
"github:badlogic/pi-mono" = "0.70.2"
"github:larksuite/cli" = "latest"
"github:Loongphy/codex-auth" = "latest"
"github:schpet/linear-cli" = "latest"
"go:github.com/bootdotdev/bootdev" = "latest"
"go:github.com/xdevplatform/xurl" = "latest"
"npm:@mariozechner/pi-coding-agent" = "0.70.2"
"npm:claude-code-sync" = "latest"
"npm:codex-sync" = "latest"
"npm:cursor-opensync-plugin" = "latest"
"npm:opencode-sync-plugin" = "latest"
"npm:pi-opensync-plugin" = "latest"
pnpm = { version = "latest", backend = "aqua:pnpm/pnpm" }
yarn = { version = "latest", backend = "vfox:mise-plugins/vfox-yarn" }

[settings]
trusted_config_paths = [
    "~/Desktop",
    "~/Documents",
    "~/Downloads/",
    "~/Developer",
]

lockfile_platforms = ["macos-arm64", "linux-x64"]
minimum_release_age = "7d"

[settings.ruby]
compile = false

[env]
_.path = [
    "~/dotfiles/generated/bin",
    "~/dotfiles/modules/bin",
    "~/.bun/bin",
    "~/.local/bin",
    "/opt/homebrew/opt/postgresql@18/bin",
]

MISE_AQUA_GITHUB_ATTESTATIONS = false
