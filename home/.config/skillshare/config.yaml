# yaml-language-server: $schema=https://raw.githubusercontent.com/runkids/skillshare/main/schemas/config.schema.json
source: /Users/alex/Developer/ipruning/skills
extras_source: ~/Developer/ipruning/skills/extras
mode: merge
targets:
  claude:
    skills:
      path: ~/.claude/skills/
  universal:
    skills:
      path: ~/.agents/skills
extras:
- name: amp
  targets:
  - path: ~/.config/amp
    mode: copy
- name: codex
  targets:
  - path: ~/.codex
    mode: copy
- name: claude
  targets:
  - path: ~/.claude
    mode: copy
ignore:
- '**/.DS_Store'
- '**/.git/**'
audit:
  block_threshold: CRITICAL
preserve_tilde_on_save: true
