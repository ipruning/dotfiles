min_version = "2026.7.5"

[tools]
python = "3.14.6"
uv = "0.11.28"

[env]
_.python.venv = { path = ".venv" }

[tasks.diff]
description = "Report configuration drift without changing files"
run = 'uv run --locked python -m scripts.diff "$@"'

[tasks.check]
description = "Inspect this host's required and optional capabilities"
run = 'uv run --locked python -m scripts.check "$@"'

[tasks.setup]
description = "Apply an explicit host profile"
run = 'uv run --locked python -m scripts.setup "$@"'

[tasks.update]
description = "Update installed host tools without synchronizing configuration"
run = 'uv run --locked python -m scripts.update "$@"'

[tasks.lint]
description = "Inspect repository paths, mappings, and symlinks"
run = 'uv run --locked python -m scripts.lint "$@"'

[tasks.format]
description = "Check Python formatting and style"
run = [
    "uv run --locked ruff check scripts tests",
    "uv run --locked ruff format --check scripts tests",
]

[tasks.test]
description = "Run behavior tests"
run = "uv run --locked pytest"

[tasks.typecheck]
description = "Check Python types"
run = "uv run --locked ty check scripts tests"

[tasks.verify]
description = "Run all repository verification"
depends = ["format", "lint", "typecheck", "test"]
