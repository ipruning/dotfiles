min_version = "2026.7.5"

[settings]
# Bootstrap is explicit (`mise install`); ordinary tasks must not install tools
# as a side effect before their own preview/apply contract starts.
task.run_auto_install = false

[tools]
# fd, jq, and ripgrep serve the module test suites that verify depends on;
# every tool in the verify chain must be mise-pinned (see AGENTS.md).
fd = "10.4.2"
jq = "1.8.2"
python = "3.14.6"
ripgrep = "15.2.0"
shellcheck = "0.11.0"
uv = "0.11.29"

[env]
_.python.venv = { path = ".venv" }

[tasks.diff]
description = "Report configuration drift without changing files"
run = 'uv run --locked python -m scripts.diff "$@"'

[tasks.restore]
description = "Preview or apply one reference application"
run = 'uv run --locked python -m scripts.restore "$@"'

[tasks.adopt]
description = "Preview or adopt one application's live configuration into the reference"
run = 'uv run --locked python -m scripts.adopt "$@"'

[tasks.check]
description = "Inspect this host's required and optional capabilities"
run = 'uv run --locked python -m scripts.check "$@"'

[tasks.setup]
description = "Preview or apply an explicit host profile"
run = 'uv run --locked python -m scripts.setup "$@"'

[tasks.update]
description = "Preview or apply host tool updates without synchronizing configuration"
run = 'uv run --locked python -m scripts.update "$@"'

[tasks.runtime]
description = "Preview or refresh generated shell runtime and owned plugins"
run = 'uv run --locked python -m scripts.runtime "$@"'

[tasks.inventory]
description = "Preview or snapshot installed host software into inventory/<host>/"
run = 'uv run --locked python -m scripts.inventory "$@"'

[tasks.zsh-profile]
description = "Profile Zsh startup time"
run = 'scripts/zsh-profile "$@"'

[tasks.lint]
description = "Inspect repository paths, mappings, and symlinks"
run = 'uv run --locked python -m scripts.lint "$@"'

[tasks.shell]
description = "Check shell files with syntax and ShellCheck gates"
run = 'uv run --locked python -m scripts.shell "$@"'

[tasks.format]
description = "Check Python formatting and style"
run = [
    "uv run --locked ruff check scripts tests",
    "uv run --locked ruff format --check scripts tests",
]

[tasks.test]
description = "Run behavior tests"
run = "uv run --locked pytest"

[tasks.test-modules]
description = "Run standalone module test suites (macOS only)"
run = """
if [ "$(uname)" != Darwin ]; then
  echo "skipped: module suites are macOS-only"
  exit 0
fi
./modules/macos-session-health/macos-session-health-test
./modules/bag-mode/bag-mode-test
./modules/macos-maxfiles/macos-maxfiles-test
"""

[tasks.typecheck]
description = "Check Python types"
run = "uv run --locked ty check scripts tests"

[tasks.verify]
description = "Run all repository verification"
depends = ["format", "lint", "shell", "typecheck", "test", "test-modules"]
