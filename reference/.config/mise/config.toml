min_version = { hard = "2026.7.12" }

[tool_alias]
aube = "aqua:jdx/aube"
pnpm = "aqua:pnpm/pnpm"
uv = "aqua:astral-sh/uv"
yarn = "vfox:mise-plugins/vfox-yarn"

[tools]
"gem:kamal" = "latest"
"github:earendil-works/pi" = "latest"
"github:larksuite/cli" = "latest"
"github:lycorp-jp/sim-use" = "latest"
"github:schpet/linear-cli" = "latest"
"go:github.com/xdevplatform/xurl" = "latest"
"npm:agent-device" = "latest"
aube = "latest"
bun = "latest"
deno = "latest"
go = "latest"
node = "latest"
pnpm = "latest"
python = "latest"
ruby = "latest"
rust = "stable"
uv = "latest"
yarn = "latest"
zig = "latest"

[settings]
auto_install = false
lockfile = true
lockfile_platforms = ["macos-arm64", "linux-x64"]
minimum_release_age = "0s"
trusted_config_paths = [
  "~/Desktop",
  "~/Developer",
  "~/Documents",
  "~/Downloads",
]

[settings.ruby]
compile = false

[env]
_.path = [
  "/opt/homebrew/opt/postgresql@18/bin",
  "~/.bun/bin",
  "~/.local/bin",
  "~/.modular/bin",
  "~/.opencode/bin",
  "~/.raindrop/bin",
]
