# yaml-language-server: $schema=https://raw.githubusercontent.com/runkids/skillshare/main/schemas/config.schema.json
sources:
  skills: ~/Developer/ipruning/skills
mode: merge
targets:
  claude:
    skills:
      path: ~/.claude/skills/
  universal:
    skills:
      path: ~/.agents/skills
ignore:
- '**/.DS_Store'
- '**/.git/**'
audit:
  block_threshold: CRITICAL
preserve_tilde_on_save: true
